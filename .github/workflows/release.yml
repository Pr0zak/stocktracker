name: release

# Tag vX.Y.Z to cut a release: builds + signs the APK and attaches it to a GitHub Release.
# Requires repo secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD.
# Optional: FINNHUB_API_KEY (baked into the release build for live stock quotes).
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build signed release APK
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pversion.name=$VERSION \
            -Pandroid.injected.signing.store.file=$PWD/release.jks \
            -Pandroid.injected.signing.store.password=$KS_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASS

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/stocktracker-${VERSION}.apk"
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.VERSION }}
          files: dist/stocktracker-${{ env.VERSION }}.apk
          generate_release_notes: true

      - name: Remove keystore
        if: always()
        run: rm -f release.jks
